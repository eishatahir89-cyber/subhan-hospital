<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Subhan Hospital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      background: #0f0a1e;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    /* Animated background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #7c3aed, transparent); top: -10%; left: -10%; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #a78bfa, transparent); bottom: -10%; right: -5%; animation-delay: -3s; }
    .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #4c1d95, transparent); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -5s; }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
    .error-card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 90%;
      background: rgba(30, 18, 60, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 24px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
      animation: fadeUp 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hospital-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(124, 58, 237, 0.15);
      border: 1px solid rgba(167, 139, 250, 0.3);
      color: #c4b5fd;
      padding: 0.4rem 1rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }
    .hospital-badge svg { flex-shrink: 0; }
    .error-code {
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 50%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
    .error-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #ede9fe;
      margin-bottom: 0.75rem;
    }
    p {
      color: #a89fd0;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn-group {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.4);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.5);
    }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      color: #c4b5fd;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      border: 1px solid rgba(167, 139, 250, 0.3);
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn-secondary:hover {
      background: rgba(124, 58, 237, 0.1);
      border-color: rgba(167, 139, 250, 0.5);
    }
    .divider { width: 60px; height: 3px; background: linear-gradient(90deg, #7c3aed, #a78bfa); border-radius: 9999px; margin: 1.5rem auto; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="error-card">
    <div class="hospital-badge">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
      </svg>
      Subhan Hospital — Admin Panel
    </div>

    <div class="error-code">404</div>
    <div class="divider"></div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. Please check the URL or navigate back to the dashboard.</p>

    <div class="btn-group">
      <a href="index.html" class="btn-primary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Back to Dashboard
      </a>
      <a href="login.html" class="btn-secondary">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15"/>
        </svg>
        Login
      </a>
    </div>
  </div>
</body>
</html>
