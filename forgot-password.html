<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subhan Hospital - Forgot Password</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-logo">
        <svg fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
        </svg>
      </div>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle" id="formSubtitle">Enter your email to receive an OTP.</p>
    </div>

    <!-- Step 1: Email Form -->
    <form id="forgotForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="resetEmail">Email Address</label>
        <div class="input-wrapper">
          <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
          </svg>
          <input type="email" id="resetEmail" class="form-input" placeholder="admin@subhan.com" required>
        </div>
        <div class="error-message" id="resetEmailError">Please enter a valid email address.</div>
      </div>
      <button type="submit" class="btn-primary" id="sendOtpBtn">
        <span class="btn-text">Send Reset Code</span>
        <div class="spinner"></div>
      </button>
      <div style="text-align: center;">
        <a href="login.html" class="back-link">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Back to Login
        </a>
      </div>
    </form>

    <!-- Step 2: OTP Form -->
    <form id="otpForm" style="display: none;" novalidate>
      <div class="form-group">
        <div class="otp-inputs" id="otpInputs">
          <input type="text" class="otp-input" maxlength="1" required>
          <input type="text" class="otp-input" maxlength="1" required>
          <input type="text" class="otp-input" maxlength="1" required>
          <input type="text" class="otp-input" maxlength="1" required>
        </div>
        <div class="error-message" id="otpError" style="text-align:center;">Invalid OTP code.</div>
      </div>
      <button type="submit" class="btn-primary" id="verifyOtpBtn">
        <span class="btn-text">Verify Code</span>
        <div class="spinner"></div>
      </button>
      <div style="text-align: center; margin-top: 1rem;">
        <p style="font-size: 0.85rem; color: var(--text-muted);">Didn't receive the code? <a href="#" id="resendOtp" class="forgot-link">Resend</a></p>
      </div>
    </form>

  </div>

  <script src="js/auth.js"></script>
</body>
</html>
